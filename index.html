<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoDark Video AI</title>
    <style>
        :root {
            --bg-base: #0a0a0c;
            --bg-surface: #141418;
            --accent: #5e6ad2;
            --accent-hover: #737fe6;
            --text-primary: #ffffff;
            --text-secondary: #8f8f9d;
            --border: #23232c;
            --error: #e04a4a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 2.5rem;
            letter-spacing: -0.05em;
            background: linear-gradient(90deg, #fff, #8f8f9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-secondary);
            margin-top: 0.5rem;
            font-size: 0.95rem;
        }

        main {
            width: 100%;
            max-width: 600px;
            background: var(--bg-surface);
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            color: var(--text-primary);
            font-size: 1rem;
            resize: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        button.primary-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        button.primary-btn:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        button.primary-btn:disabled {
            background: var(--border);
            color: var(--text-secondary);
            cursor: not-allowed;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            display: none;
            margin-bottom: 1rem;
            border: 1px solid var(--border);
        }

        .video-wrapper.active {
            display: block;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* NOTE: Baking the "GoDark" watermark directly into the exported MP4 file
          requires server-side FFmpeg or a heavy WASM port (@ffmpeg/ffmpeg) which 
          drastically reduces frontend performance. Per requirements, keeping this 
          as a secure, lightweight preview overlay. 
        */
        .watermark {
            position: absolute;
            bottom: 12px;
            right: 16px;
            font-weight: 800;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.85);
            text-shadow: 0px 2px 4px rgba(0,0,0,0.9);
            pointer-events: none;
            letter-spacing: 0.05em;
        }

        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            display: none;
        }

        .actions.active {
            display: flex;
        }

        .secondary-btn {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .secondary-btn:hover {
            background: var(--border);
        }

        /* Loading State */
        .loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 10;
        }

        .loading-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Custom Modal */
        .modal-backdrop {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: 0.2s;
            z-index: 100;
        }

        .modal-backdrop.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: var(--bg-surface);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            width: 90%;
            max-width: 400px;
            text-align: center;
            transform: translateY(20px);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-backdrop.active .modal {
            transform: translateY(0);
        }

        .modal-title { margin-bottom: 1rem; color: var(--error); font-weight: 600; }
        .modal-message { color: var(--text-secondary); margin-bottom: 2rem; font-size: 0.95rem; line-height: 1.5; }
        .modal-close {
            background: var(--border);
            color: var(--text-primary);
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
        }

        .modal-close:hover { background: #2f2f3b; }
    </style>
</head>
<body>

    <header>
        <h1>GoDark Video</h1>
        <p>Cinematic AI Generation</p>
    </header>

    <main>
        <div class="input-group">
            <textarea id="promptInput" placeholder="Describe your scene in detail..."></textarea>
            <button id="generateBtn" class="primary-btn">Generate Scene</button>
        </div>

        <div id="videoWrapper" class="video-wrapper">
            <video id="resultVideo" autoplay loop muted playsinline></video>
            <div class="watermark">GoDark</div>
            
            <div id="loadingOverlay" class="loading-overlay">
                <div class="spinner"></div>
                <p>Synthesizing pixels...</p>
            </div>
        </div>

        <div id="actionRow" class="actions">
            <button id="downloadBtn" class="secondary-btn">Download Original File</button>
        </div>
    </main>

    <div id="errorModal" class="modal-backdrop">
        <div class="modal">
            <h3 class="modal-title">Generation Error</h3>
            <p id="errorMsg" class="modal-message">An unknown error occurred.</p>
            <button class="modal-close" onclick="closeModal()">Dismiss</button>
        </div>
    </div>

    <script>
        // --- 1. Database Initialization (IndexedDB) ---
        const DB_NAME = 'GoDarkDB';
        const STORE_NAME = 'video_history';
        let db;

        const request = indexedDB.open(DB_NAME, 1);
        request.onupgradeneeded = (e) => {
            const tempDb = e.target.result;
            if (!tempDb.objectStoreNames.contains(STORE_NAME)) {
                tempDb.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
            }
        };
        request.onsuccess = (e) => { db = e.target.result; };
        request.onerror = (e) => { console.error('IndexedDB Error:', e); };

        function saveToHistory(prompt, base64Data) {
            if (!db) return;
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            store.add({ prompt, base64Data, timestamp: Date.now() });
        }

        // --- 2. UI Elements ---
        const promptInput = document.getElementById('promptInput');
        const generateBtn = document.getElementById('generateBtn');
        const videoWrapper = document.getElementById('videoWrapper');
        const resultVideo = document.getElementById('resultVideo');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const actionRow = document.getElementById('actionRow');
        const downloadBtn = document.getElementById('downloadBtn');
        const errorModal = document.getElementById('errorModal');
        const errorMsg = document.getElementById('errorMsg');

        let currentBase64Video = null;

        // --- 3. Error Handling Modals ---
        function showError(message) {
            errorMsg.textContent = message;
            errorModal.classList.add('active');
            resetUIState();
        }

        function closeModal() {
            errorModal.classList.remove('active');
        }

        function resetUIState() {
            generateBtn.disabled = false;
            generateBtn.textContent = 'Generate Scene';
            loadingOverlay.classList.remove('active');
        }

        // --- 4. Main Generation Flow ---
        generateBtn.addEventListener('click', async () => {
            const prompt = promptInput.value.trim();
            if (!prompt) {
                showError('Please enter a descriptive prompt first.');
                return;
            }

            // Lock UI
            generateBtn.disabled = true;
            generateBtn.textContent = 'Generating...';
            videoWrapper.classList.add('active');
            loadingOverlay.classList.add('active');
            actionRow.classList.remove('active');
            resultVideo.removeAttribute('src'); // Clear previous

            try {
                // NEVER call Hugging Face directly. Route through backend safely.
                const response = await fetch('/api/generate-video', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || `Server responded with status: ${response.status}`);
                }

                if (data.success && data.mediaBase64) {
                    currentBase64Video = data.mediaBase64;
                    resultVideo.src = currentBase64Video;
                    
                    // Reveal actions & hide loader
                    loadingOverlay.classList.remove('active');
                    generateBtn.disabled = false;
                    generateBtn.textContent = 'Generate Scene';
                    actionRow.classList.add('active');

                    // Save success permanently locally
                    saveToHistory(prompt, currentBase64Video);
                } else {
                    throw new Error('Invalid data payload received from backend.');
                }

            } catch (err) {
                console.error('Generation Flow Error:', err);
                showError(err.message || 'Network connection failed or request timed out.');
            }
        });

        // --- 5. Export/Download Feature ---
        downloadBtn.addEventListener('click', () => {
            if (!currentBase64Video) return;
            
            const link = document.createElement('a');
            link.href = currentBase64Video;
            link.download = `godark_generation_${Date.now()}.mp4`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
